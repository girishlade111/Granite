  <!-- Quartz (white/light grey) -->
  <g fill="#D0D4DE" opacity="0.5">
    <circle cx="258" cy="222" r="3"/><circle cx="232" cy="262" r="2.2"/>
    <circle cx="288" cy="205" r="2.8"/><circle cx="272" cy="308" r="1.8"/>
    <circle cx="218" cy="185" r="2.2"/><circle cx="328" cy="252" r="1.8"/>
    <circle cx="198" cy="272" r="1.8"/><circle cx="308" cy="290" r="1.5"/>
    <circle cx="252" cy="338" r="2.2"/><circle cx="170" cy="225" r="1.8"/>
    <circle cx="340" cy="175" r="2"/><circle cx="195" cy="310" r="2"/>
    <circle cx="240" cy="140" r="2.5"/><circle cx="310" cy="160" r="1.8"/>
    <circle cx="160" cy="280" r="1.5"/><circle cx="350" cy="290" r="2"/>
    <circle cx="230" cy="190" r="2"/><circle cx="290" cy="260" r="2"/>
    <circle cx="260" cy="300" r="1.5"/><circle cx="180" cy="200" r="1.8"/>
  </g>

  <!-- Feldspar (grey) -->
  <g fill="#A0A8B8" opacity="0.45">
    <circle cx="225" cy="235" r="2.5"/><circle cx="302" cy="228" r="2.2"/>
    <circle cx="248" cy="200" r="2"/><circle cx="278" cy="268" r="2.5"/>
    <circle cx="205" cy="305" r="1.8"/><circle cx="158" cy="292" r="2"/>
    <circle cx="290" cy="155" r="2"/><circle cx="365" cy="235" r="1.8"/>
    <circle cx="235" cy="300" r="2.2"/><circle cx="320" cy="270" r="1.5"/>
    <circle cx="175" cy="248" r="2"/><circle cx="380" cy="270" r="1.5"/>
    <circle cx="270" cy="230" r="1.8"/><circle cx="210" cy="260" r="1.5"/>
  </g>

  <!-- Dark mica (black) -->
  <g fill="#141418" opacity="0.5">
    <circle cx="268" cy="258" r="2.2"/><circle cx="244" cy="302" r="1.8"/>
    <circle cx="312" cy="215" r="2"/><circle cx="228" cy="152" r="2.2"/>
    <circle cx="192" cy="242" r="1.8"/><circle cx="348" cy="268" r="1.5"/>
    <circle cx="275" cy="185" r="2"/><circle cx="212" cy="328" r="2"/>
    <circle cx="335" cy="195" r="1.5"/><circle cx="265" cy="280" r="1.8"/>
    <circle cx="218" cy="210" r="1.5"/><circle cx="330" cy="300" r="1.5"/>
    <circle cx="250" cy="250" r="1.8"/><circle cx="295" cy="330" r="1.5"/>
  </g>

  <!-- ===== EDGE LINES ===== -->
  <g fill="none" stroke-linejoin="round">
    <polyline points="242,178 205,225 215,290 256,345 326,296 335,232 298,182 242,178" stroke="#788094" stroke-width="2.5" opacity="0.65"/>
    <polyline points="242,178 185,165 222,108 278,112 298,182" stroke="#8892A8" stroke-width="2" opacity="0.55"/>
    <polyline points="298,182 278,112 338,108 376,162 366,210 335,232" stroke="#9AA4B8" stroke-width="2" opacity="0.5"/>
    <polyline points="205,225 146,260 140,202 185,165" stroke="#687084" stroke-width="2" opacity="0.45"/>
    <polyline points="146,260 185,298 164,335 126,308 110,272 140,202" stroke="#485064" stroke-width="1.5" opacity="0.35"/>
    <polyline points="335,232 366,210 376,256 356,316 326,296" stroke="#586074" stroke-width="1.8" opacity="0.4"/>
    <polyline points="215,290 185,335 250,374 306,354 326,296" stroke="#384050" stroke-width="1.8" opacity="0.35"/>
    <polyline points="306,354 354,364 386,336 356,316" stroke="#283040" stroke-width="1.5" opacity="0.3"/>
    <polyline points="126,308 164,335 185,335 215,290" stroke="#384050" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- ===== RIM LIGHTING ===== -->
  <g fill="none" stroke-linejoin="round">
    <polyline points="222,108 242,178 298,182 278,112" stroke="#C8D0E4" stroke-width="1.8" opacity="0.35"/>
    <polyline points="278,112 338,108 376,162" stroke="#B0BCD0" stroke-width="1.4" opacity="0.25"/>
    <polyline points="185,165 205,225 215,290" stroke="#A0A8C0" stroke-width="1.2" opacity="0.2"/>
    <polyline points="335,232 366,210 376,256" stroke="#8890A8" stroke-width="1.2" opacity="0.18"/>
