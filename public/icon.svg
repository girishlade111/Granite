<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="fTop" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#50555E"/>
      <stop offset="100%" stop-color="#383B42"/>
    </linearGradient>
    <linearGradient id="fLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3A3D45"/>
      <stop offset="100%" stop-color="#282A30"/>
    </linearGradient>
    <linearGradient id="fRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D3038"/>
      <stop offset="100%" stop-color="#1B1C22"/>
    </linearGradient>
    <linearGradient id="fBright" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#606570"/>
      <stop offset="100%" stop-color="#787E8C"/>
    </linearGradient>
    <linearGradient id="fNavy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E3542"/>
      <stop offset="100%" stop-color="#1E232E"/>
    </linearGradient>
    <linearGradient id="fBottom" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#25272D"/>
      <stop offset="100%" stop-color="#111215"/>
    </linearGradient>
    <linearGradient id="fRim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7E8798"/>
      <stop offset="100%" stop-color="#505562"/>
    </linearGradient>
    <linearGradient id="fDark" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1A1C20"/>
      <stop offset="100%" stop-color="#0C0D10"/>
    </linearGradient>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="258" cy="388" rx="100" ry="20" fill="#000" opacity="0.3"/>
  <ellipse cx="254" cy="395" rx="75" ry="12" fill="#000" opacity="0.15"/>

  <!-- Deep shadow core -->
  <polygon points="256,370 180,300 160,220 220,135 320,145 380,260 340,340" fill="#0E0F12" opacity="0.2"/>

  <!-- ===== FACETS ===== -->
  <!-- Center facet -->
  <polygon points="256,345 215,290 205,225 242,178 298,182 335,232 326,296" fill="url(#fTop)"/>

  <!-- Top facet (bright) -->
  <polygon points="242,178 205,225 185,165 222,108 278,112 298,182" fill="url(#fBright)"/>

  <!-- Top-right facet -->
  <polygon points="298,182 278,112 338,108 376,162 366,210 335,232" fill="url(#fRim)"/>

  <!-- Left facet -->
  <polygon points="205,225 215,290 185,298 146,260 140,202 185,165" fill="url(#fLeft)"/>

  <!-- Far-left facet -->
  <polygon points="146,260 185,298 164,335 126,308 110,272 140,202" fill="url(#fNavy)"/>

  <!-- Right facet -->
  <polygon points="335,232 366,210 376,256 356,316 326,296" fill="url(#fRight)"/>

  <!-- Far-right facet -->
  <polygon points="376,256 356,316 386,336 406,300 396,258" fill="url(#fNavy)"/>

  <!-- Bottom facet -->
  <polygon points="215,290 256,345 326,296 306,354 250,374 185,335" fill="url(#fBottom)"/>

  <!-- Bottom-right corner -->
  <polygon points="326,296 306,354 354,364 386,336 356,316" fill="url(#fDark)"/>

  <!-- Bottom-left corner -->
  <polygon points="215,290 185,335 164,335 126,308 185,298" fill="url(#fDark)"/>

  <!-- Top-left bevel -->
  <polygon points="185,165 205,225 175,212 152,172" fill="url(#fLeft)"/>

  <!-- Center ridge line -->
  <polygon points="256,345 242,178 256,186 268,336" fill="#FFFFFF" opacity="0.015"/>

