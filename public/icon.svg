  <!-- ===== SPECULAR HIGHLIGHTS ===== -->
  <g fill="#FFFFFF">
    <ellipse cx="250" cy="148" rx="28" ry="8" opacity="0.05" transform="rotate(-14,250,148)"/>
    <ellipse cx="262" cy="140" rx="16" ry="5" opacity="0.06" transform="rotate(-8,262,140)"/>
    <ellipse cx="328" cy="152" rx="18" ry="6" opacity="0.035" transform="rotate(-24,328,152)"/>
    <ellipse cx="262" cy="242" rx="22" ry="10" opacity="0.025" transform="rotate(-4,262,242)"/>
    <ellipse cx="244" cy="256" rx="10" ry="6" opacity="0.02" transform="rotate(-10,244,256)"/>
  </g>

  <!-- ===== AMBIENT OCCLUSION ===== -->
  <g fill="#000">
    <polygon points="126,308 164,335 159,331 133,304" opacity="0.18"/>
    <polygon points="386,336 354,364 359,360 378,339" opacity="0.12"/>
    <polygon points="110,272 140,202 135,222 115,262" opacity="0.1"/>
    <polygon points="376,162 394,258 390,248 377,178" opacity="0.06"/>
    <ellipse cx="256" cy="378" rx="65" ry="12" opacity="0.12"/>
  </g>
</svg>
